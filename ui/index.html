    <script>
        function processFeed(response) {
            var newsContainer = document.getElementById("adbreakingnews");
            var entries = response.feed.entry;
            if (entries) {
                var newsList = "<ul>";
                entries.forEach(function(entry) {
                    var postLink = entry.link.find(l => l.rel === "alternate").href;
                    newsList += '<li class="af_news"><a href="' + postLink + '" target="_blank">' + entry.title.$t + "</a></li>";
                });
                newsList += "</ul>";
                newsContainer.innerHTML = newsList;
                let af_now = 0; const af_boxes = document.querySelectorAll(".af_news");
                if (af_boxes.length > 0) {
                    af_boxes[af_now].classList.add("active");
                    setInterval(() => {
                        af_boxes[af_now].classList.remove("active");
                        af_now = (af_now + 1) % af_boxes.length;
                        setTimeout(() => af_boxes[af_now].classList.add("active"), 500);
                    }, 4000);
                }
            }
        }
    </script>

    <script type="text/javascript">
        const MAX_POSTS = 99;
        const BULLET_CHAR = "&#x2727;";
        function RecentPostsScrollerv2(json) {
            try {
                let headlines = "";
                for (let i = 0; i < MAX_POSTS; i++) {
                    const post = json.feed.entry[i];
                    if (!post) break;
                    let postURL = "";
                    for (let j = 0; j < post.link.length; j++) {
                        if (post.link[j].rel === 'alternate') { postURL = post.link[j].href; break; }
                    }
                    headlines += `<b>${BULLET_CHAR}</b> <a target="_blank" href="${postURL}">${post.title.$t}</a>&nbsp;&nbsp;`;
                }
                const fullText = headlines.repeat(4);

   <script>
        const myAudio = document.getElementById("bgAudio");
        
        let isStarted = false;
        const ARC_RADIUS = 30; 
        let analyser, dataArray, vBars = [];
        let audioCtx, source;
        let isAudioSetup = false; 

        function startAudioSync() {
            if (isStarted) return;
            isStarted = true;

            if (!isAudioSetup) {
                const vContainer = document.getElementById('visualizer');
                vContainer.innerHTML = ''; vBars = [];
                
                const numBars = 50;         
                const startAngle = -135;  
                const endAngle = 135;     
                const step = (endAngle - startAngle) / (numBars - 1);

                for (let i = 0; i < numBars; i++) {
                    const b = document.createElement('div'); 
                    b.className = 'v-bar';
                    const angle = startAngle + (i * step);
                    b.dataset.angle = angle;
                    b.style.transform = `rotate(${angle}deg) translateY(-${ARC_RADIUS}px)`;
                    vContainer.appendChild(b); 
                    vBars.push(b);
                }

                try {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    source = audioCtx.createMediaElementSource(myAudio);
                    analyser = audioCtx.createAnalyser();
                    source.connect(analyser);
                    analyser.connect(audioCtx.destination);
                    analyser.fftSize = 128;
                    analyser.smoothingTimeConstant = 0.4;
                    dataArray = new Uint8Array(analyser.frequencyBinCount);
                    isAudioSetup = true; 
                } catch(e) { console.log("Audio Setup Error:", e); }
            }

            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const renderVisualizer = () => {
                if (!isStarted || !analyser) return; 
                requestAnimationFrame(renderVisualizer);
                analyser.getByteFrequencyData(dataArray);
                
                const half = Math.floor(vBars.length / 2);
                let totalVolume = 0;
                const activeDataLength = Math.floor(analyser.frequencyBinCount / 2); 
                const mappingRatio = activeDataLength / half; 

                vBars.forEach((bar, index) => {
                    let dataIndex;
                    if (index < half) {
                        dataIndex = Math.floor((half - index) * mappingRatio);
                    } else {
                        dataIndex = Math.floor((index - half) * mappingRatio);
                    }
                    if(dataIndex >= dataArray.length) dataIndex = dataArray.length - 1;
                    const val = dataArray[dataIndex] || 0;
                    bar.style.transform = `rotate(${bar.dataset.angle}deg) translateY(-${ARC_RADIUS}px) scaleY(${1 + (val / 30)})`;
                    totalVolume += val; 
                });

                const avgVol = totalVolume / vBars.length;
                const glowDiv = document.getElementById('justice-glow');
                if (glowDiv) glowDiv.style.opacity = Math.min(0.9, avgVol / 120);
            };
            
            renderVisualizer();
            myAudio.play();
        }

        function startAutoSocialBanner() {
            const socialBanner = document.getElementById("social-banner-overlay");
            if (!socialBanner) return;

            function triggerSocial() {
                socialBanner.classList.add("show-social"); 
                setTimeout(() => {
                    socialBanner.classList.remove("show-social"); 
                }, 18000); 
            }

            setTimeout(triggerSocial, 30000);
            setInterval(triggerSocial, 40000); 
        }

        window.addEventListener('load', startAutoSocialBanner);

        // Remote Control Logic
        const WORKER_URL = "https://vaagai-remote.lawtamil.workers.dev"; 
        let lastSignalTime = 0;

        async function checkRemoteSignal() {
            try {
                const response = await fetch(`${WORKER_URL}/signal`);
                if (!response.ok) return;

                const data = await response.json();
                
                if (data.time > lastSignalTime && (Date.now() - data.time) < 5000) {
                    lastSignalTime = data.time;
                    executeRemoteCommand(data.cmd);
                }
            } catch (error) {
                console.log("Remote signal fetch error:", error);
            }
        }

        function executeRemoteCommand(command) {
            console.log("Signal received:", command);
            
            if (command === "toggle_social") {
                document.getElementById('layer-image-slider').classList.toggle('active');
            }
            else if (command === "toggle_text") {
                document.getElementById('layer-text-slider').classList.toggle('active');
            }
            else if (command === "toggle_video") {
                document.getElementById('layer-video-mask').classList.toggle('active');
            }
            else if (command === "play") {
                startAudioSync();
            }
            else if (command === "pause") {
                if(myAudio && !myAudio.paused) myAudio.pause();
                isStarted = false; 
            }
            else if (command === "toggle_webrtc") {
                const webrtc = document.getElementById('layer-webrtc');
                webrtc.style.opacity = webrtc.style.opacity === "0" ? "1" : "0";
            }
        }

        setInterval(checkRemoteSignal, 1000);

        // Blogger Feed Animation Logic
        var textChunks = []; 
        var currentChunkIndex = 0;
        var textContainer = document.getElementById('blogger-post-content');
        var animationSpeed = 70; 

        function handleBloggerFeed(json) {
            if (json.feed && json.feed.entry && json.feed.entry.length > 0) {
                var entry = json.feed.entry[0]; 
                var title = entry.title.$t;
                
                var contentHtml = entry.content ? entry.content.$t : "";
                
                contentHtml = contentHtml.replace(/<\/(p|div|li|h[1-6])>/gi, " </$1> ")
                                         .replace(/<br\s*[\/]?>/gi, " ");

                var tempDiv = document.createElement("div");
                tempDiv.innerHTML = contentHtml;
                var plainText = tempDiv.textContent || tempDiv.innerText || "";
                
                plainText = plainText.replace(/\s+/g, ' ').trim();

                textChunks.push(title);

                var safeText = plainText
                    .replace(/\.(com|in|org|net|gov|edu|co|info)\b/gi, "@DOMAINDOT@$1") 
                    .replace(/\bwww\./gi, "www@DOMAINDOT@")
                    .replace(/(\d)\.(\d)/g, "$1@DECIMAL@$2") 
                    .replace(/\b(\d+)\./g, "$1@DOT@") 
                    .replace(/\b(vs|v|sec|art|no|dr|mr|mrs)\./gi, "$1@DOT@"); 

                safeText = safeText.replace(/([.!?]+)(\s*)/g, "$1|SPLIT|");

                var rawSentences = safeText.split("|SPLIT|");

                for (var i = 0; i < rawSentences.length; i++) {
                    var s = rawSentences[i].trim();
                    if (s.length === 0) continue;

                    s = s.replace(/@DOMAINDOT@/g, ".")
                         .replace(/@DECIMAL@/g, ".")
                         .replace(/@DOT@/g, ".");

                    textChunks.push(s);
                }

                if (textChunks.length > 0) {
                    animateNextChunk();
                }
            }
        }

        function animateNextChunk() {
            if (!textChunks.length) return;
            var currentText = textChunks[currentChunkIndex];
            var words = currentText.split(" ");
            var formattedText = "";
            
            for (var i = 0; i < words.length; i++) {
                formattedText += "<span class='word'>" + words[i] + "</span> ";
            }

            textContainer.innerHTML = formattedText;

            var dynamicReadingTime = Math.max(3000, words.length * 350);

            anime.timeline({loop: false})
            .add({
                targets: '.ml10 .word',
                rotateY: [-90, 0],
                duration: 1300,
                delay: function(el, i) { return animationSpeed * i; } 
            }).add({
                targets: '.ml10',
                opacity: 0,
                duration: 1000,
                easing: "easeOutExpo",
                delay: dynamicReadingTime,
                complete: function() {
                    currentChunkIndex++;
                    
                    if(currentChunkIndex >= textChunks.length) {
                        currentChunkIndex = 0; 
                    }
                    
                    document.querySelector('.ml10').style.opacity = 1; 
                    animateNextChunk(); 
                }
            });
        }
    </script>

    <script src="https://feed.vaagaiseithigal.com/feeds/posts/default/-/CTicker?alt=json-in-script&max-results=1&callback=handleBloggerFeed"></script>
